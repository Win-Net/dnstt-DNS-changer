# ═══════════════════════════════════════════════════════════
# DNSTT-DNS-Changer Configuration v1.3.0
# https://github.com/Win-Net/dnstt-DNS-changer
# ═══════════════════════════════════════════════════════════

# DNS Servers (ip:port)
DNS_SERVERS=(
    "188.213.65.54:53"
    "185.100.200.10:53"
)

# Domains (one per DNS server, same order)
DOMAINS=(
    "n.example.com"
    "n.example.com"
)

# DNSTT Client Binary
BINARY="/root/dnstt-client-linux-amd64"

# Public Key
PUBKEY_FILE="/root/pub.key"

# Local SOCKS5 Listen
LOCAL_LISTEN="127.0.0.1:1080"

# Protocol: udp or dot
PROTOCOL="udp"

# ─── Health Check ───
HEALTH_CHECK_INTERVAL=30

# Switch server after N failures
MAX_FAILURES=3

# Wait when all servers fail (seconds)
ALL_FAILED_WAIT=30

# ─── Auto Restart ───
# When connection drops, auto restart same server before switching
AUTO_RESTART_ENABLED=true

# Check connection every N seconds
AUTO_RESTART_CHECK=20

# Max restart tries before switching to next server
AUTO_RESTART_MAX_TRIES=3

# ─── SOCKS Test ───
SOCKS_TEST_ENABLED=false
SOCKS_TEST_URL="http://www.google.com"
SOCKS_TEST_TIMEOUT=15
