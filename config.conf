# ═══════════════════════════════════════════════════════════
# DNSTT-DNS-Changer Configuration v1.9.0
# https://github.com/Win-Net/dnstt-DNS-changer
# ═══════════════════════════════════════════════════════════

# DNS Servers (ip:port)
DNS_SERVERS=(
    "188.213.65.54:53"
    "185.100.200.10:53"
)

# Domains (one per DNS server, same order)
DOMAINS=(
    "n.example.com"
    "n.example.com"
)

# DNSTT Client Binary
BINARY="/root/dnstt-client-linux-amd64"

# Public Key
PUBKEY_FILE="/root/pub.key"

# Local SOCKS5 Listen
LOCAL_LISTEN="127.0.0.1:1080"

# Protocol: udp or dot
PROTOCOL="udp"

# ─── Connection Check ───
AUTO_RESTART_CHECK=15
MAX_FAILURES=2
ALL_FAILED_WAIT=30

# ─── Auto Restart ───
AUTO_RESTART_ENABLED=true
AUTO_RESTART_MAX_TRIES=3

# ─── SOCKS Test ───
SOCKS_TEST_ENABLED=false
SOCKS_TEST_URL="http://www.google.com"
SOCKS_TEST_TIMEOUT=15

# ─── Auto Scan ───
# When all DNS servers fail, auto-scan for new ones
AUTO_SCAN_ENABLED=false
AUTO_SCAN_TRIGGER=2
AUTO_SCAN_COUNT=30
AUTO_SCAN_DOMAIN=""
AUTO_SCAN_PORT=53
