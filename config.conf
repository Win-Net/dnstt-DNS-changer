# ═══════════════════════════════════════════════════════════
# DNSTT-DNS-Changer Configuration
# https://github.com/Win-Net/dnstt-DNS-changer
# ═══════════════════════════════════════════════════════════

# DNS Servers (ip:port)
DNS_SERVERS=(
    "188.213.65.54:53"
    "185.100.200.10:53"
)

# Domains (one per DNS server, same order)
DOMAINS=(
    "n.example.com"
    "n.example.com"
)

# DNSTT Binary
BINARY="/usr/local/bin/dnstt-client"

# Public Key
PUBKEY_FILE="/etc/dnstt-DNS-changer/pub.key"

# Local SOCKS5 Listen
LOCAL_LISTEN="127.0.0.1:1080"

# Protocol: udp or dot
PROTOCOL="udp"

# Health check interval (seconds)
HEALTH_CHECK_INTERVAL=30

# Switch after N failures
MAX_FAILURES=3

# Wait when all servers fail (seconds)
ALL_FAILED_WAIT=30

# SOCKS test (set to false if you have connection issues)
SOCKS_TEST_ENABLED=false
SOCKS_TEST_URL="http://www.google.com"
SOCKS_TEST_TIMEOUT=15
